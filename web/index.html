<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="app">
    <div id="room-panel">
      <div id="world-tag"></div>
      <h2 id="room-name">...</h2>
      <p id="room-desc"></p>
      <div id="exits-bar">Exits: <span id="exits"></span></div>
      <div id="people-bar"></div>
    </div>

    <div id="output-panel">
      <div id="messages"></div>
    </div>

    <div id="input-panel">
      <input id="cmd-input" type="text" placeholder="What do you do?" autocomplete="off" autofocus>
      <button id="cmd-send">Send</button>
    </div>

    <!-- World selection overlay -->
    <div id="world-overlay" class="overlay">
      <div class="overlay-box">
        <h1>Choose a World</h1>
        <div id="world-list">Loading worlds…</div>
        <p id="world-error" class="error hidden"></p>
      </div>
    </div>

    <!-- Auth overlay (login / register / guest) -->
    <div id="auth-overlay" class="overlay hidden">
      <div class="overlay-box">
        <h1 id="auth-world-title"></h1>
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="login">Login</button>
          <button class="tab-btn" data-tab="register">Register</button>
          <button class="tab-btn" data-tab="guest">Guest</button>
        </div>

        <div id="tab-login" class="auth-tab">
          <input id="login-user" type="text" maxlength="32" placeholder="Username" autocomplete="username">
          <input id="login-pass" type="password" maxlength="64" placeholder="Password" autocomplete="current-password">
          <button id="login-btn">Login</button>
        </div>

        <div id="tab-register" class="auth-tab hidden">
          <input id="reg-user" type="text" maxlength="32" placeholder="Username" autocomplete="username">
          <input id="reg-pass" type="password" maxlength="64" placeholder="Password (min 4 chars)" autocomplete="new-password">
          <button id="reg-btn">Create Account</button>
        </div>

        <div id="tab-guest" class="auth-tab hidden">
          <input id="guest-name" type="text" maxlength="24" placeholder="Display name…" autocomplete="off">
          <button id="guest-btn">Play as Guest</button>
        </div>

        <p id="auth-error" class="error hidden"></p>
        <button id="auth-back-btn" class="muted">← Back to worlds</button>
      </div>
    </div>

    <!-- Name entry overlay (logged-in users skip this) -->
    <div id="name-overlay" class="overlay hidden">
      <div class="overlay-box">
        <h1 id="name-world-title"></h1>
        <p>Enter your name</p>
        <input id="name-input" type="text" maxlength="24" placeholder="Name…" autocomplete="off">
        <button id="name-btn">Enter</button>
        <button id="back-btn" class="muted">← Back</button>
      </div>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
